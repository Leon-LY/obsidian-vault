<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>并蒂星球 · 设计原型 v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #E8E6E1; color: #1A1A2E; -webkit-font-smoothing: antialiased;
    padding: 48px 32px; display: flex; justify-content: center; min-height: 100vh;
  }
  .gallery {
    display: flex; gap: 36px; flex-wrap: wrap; justify-content: center; align-items: flex-start;
    max-width: 1950px;
  }
  .phone-wrap { text-align: center; }
  .phone-label {
    font-size: 13px; font-weight: 600; color: #8E8E93; letter-spacing: 0.5px;
    margin-bottom: 16px; text-transform: uppercase;
  }
  .iphone {
    width: 393px; height: 852px; background: #0A0A0A; border-radius: 55px;
    padding: 12px; position: relative;
    box-shadow: 0 0 0 2px #1A1A1A, 0 24px 80px rgba(0,0,0,0.18);
  }
  .iphone-inner {
    width: 100%; height: 100%; background: #F8F6F2; border-radius: 43px;
    overflow: hidden; position: relative;
  }
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 34px; background: #0A0A0A; border-radius: 20px; z-index: 100;
  }
  .status-row {
    position: absolute; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; z-index: 99; pointer-events: none;
    font-size: 16px; font-weight: 600; color: #1A1A2E;
  }
  .screen {
    height: 100%; overflow-y: auto; padding: 54px 0 0 0;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .screen::-webkit-scrollbar { display: none; }
  /* Typography scale: 26px title, 17px heading, 15px body, 13px caption */
  .t-title { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  .t-heading { font-size: 17px; font-weight: 600; }
  .t-body { font-size: 15px; font-weight: 400; }
  .t-caption { font-size: 13px; font-weight: 400; color: #8E8E93; }
  .t-small { font-size: 11px; color: #8E8E93; }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<div class="gallery" id="gallery"></div>

    React.createElement('div', {style:{marginTop:60,fontSize:14,color:T2,lineHeight:1.6,textAlign:'center'}},React.createElement('span',null,'中国首款双胞胎育儿伴侣'))

// ====== Home ======

// ====== Growth ======
function Growth() {
  const [tab,setTab] = useState('weight');
  return React.createElement('div', {style:{padding:'0 22px'}},
    React.createElement('div', {style:{textAlign:'center',padding:'18px 0 0'}},

            React.createElement('span', {style:{fontSize:14,fontWeight:600}},'大宝')

            React.createElement('div', {style:{width:12,height:12,borderRadius:6,background:PINK}}),

        React.createElement('line', {x1:36,y1:150,x2:330,y2:150,stroke:'#EDE8E0',strokeWidth:1}),
        React.createElement('line', {x1:36,y1:110,x2:330,y2:110,stroke:'#F5F2ED',strokeWidth:1,strokeDasharray:'4,6'}),

        React.createElement('circle', {cx:330,cy:86,r:5,fill:BLUE,opacity:'0.8'}),

    ),
    React.createElement('div', {style:{display:'flex',gap:10,marginTop:16}},
      [{nm:'大宝',val:'16.8',unit:'kg',pct:'68%',c:BLUE},{nm:'二宝',val:'14.2',unit:'kg',pct:'45%',c:PINK}].map(function(b,i){
        return React.createElement('div', {key:i,style:{flex:1,background:SURFACE,borderRadius:20,padding:18,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}},
          React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},
            React.createElement(BabyDot, {name:b.nm,color:b.c,size:40}),
            React.createElement('div', {className:'t-heading',style:{fontSize:15}},b.nm)
          ),
          React.createElement('div', {style:{display:'flex',alignItems:'baseline',gap:4}},
            React.createElement('span', {style:{fontSize:34,fontWeight:700,color:TEXT}},b.val),
            React.createElement('span', {style:{fontSize:14,color:T2}},b.unit)
          ),

// ====== Record — 大手按钮版 ======
function Record() {
  return React.createElement('div', {style:{padding:'0 22px'}},
    React.createElement('div', {style:{padding:'18px 0 12px',textAlign:'center'}},
      React.createElement('div', {className:'t-title',style:{fontSize:22}},'双轨记录'),
      React.createElement('div', {className:'t-caption',style:{marginTop:3}},'最多两次点击 · 单手完成')

      })

    // 最近记录
    React.createElement('div', {className:'t-heading',style:{fontSize:14,marginBottom:10}},'最近记录'),
    [{emoji:'🍼',baby:'大宝',detail:'20分钟',time:'32分钟前',c:BLUE},
     {emoji:'🧷',baby:'二宝',detail:'湿尿布',time:'1小时前',c:PINK},
     {emoji:'😴',baby:'大宝',detail:'45分钟',time:'2小时前',c:BLUE}].map(function(l,i){
      return React.createElement('div', {key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:SURFACE,borderRadius:14,marginBottom:6,boxShadow:'0 1px 2px rgba(0,0,0,0.02)'}},
        React.createElement('div', {style:{width:40,height:40,borderRadius:14,background:l.c+'10',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}},l.emoji),

          React.createElement('div', {className:'t-body',style:{fontSize:14,fontWeight:500}},l.baby,' · ',l.emoji,' ',l.detail),

// ====== Render ======
function Phone({title,children,activeTab,hideTabBar}) {
  return React.createElement('div', {className:'phone-wrap'},
    React.createElement('div', {className:'phone-label'}, title),
    React.createElement('div', {className:'iphone'},
      React.createElement('div', {className:'iphone-inner'},
        React.createElement('div', {className:'island'}),
        React.createElement('div', {className:'status-row'},
          React.createElement('span',null,'9:41'),
          React.createElement('span',null,'●●●●○')

        React.createElement('div', {className:'screen'},
          children,
          !hideTabBar && React.createElement(TabBar, {active:activeTab||0})

}

ReactDOM.createRoot(document.getElementById('gallery')).render(
  React.createElement(React.Fragment, null,
    React.createElement(Phone, {title:'启动页',hideTabBar:true}, React.createElement(Splash)),
    React.createElement(Phone, {title:'首页',activeTab:0}, React.createElement(Home)),
    React.createElement(Phone, {title:'生长曲线',activeTab:1}, React.createElement(Growth)),
    React.createElement(Phone, {title:'双轨记录',activeTab:2}, React.createElement(Record))
  )

</script>

</html>
