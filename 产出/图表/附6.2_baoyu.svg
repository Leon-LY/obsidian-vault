<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1a5276"/></marker>
    <filter id="sh"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.12"/></filter>
    <linearGradient id="gdb" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a5276"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
    <linearGradient id="gmb" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2471a3"/><stop offset="100%" stop-color="#2e86c1"/></linearGradient>
    <linearGradient id="gte" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1abc9c"/><stop offset="100%" stop-color="#16a085"/></linearGradient>
    <linearGradient id="gdk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/></linearGradient>
    <linearGradient id="gor" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f39c12"/><stop offset="100%" stop-color="#e67e22"/></linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <linearGradient id="ggr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#27ae60"/><stop offset="100%" stop-color="#229954"/></linearGradient>
    <linearGradient id="gpr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8e44ad"/><stop offset="100%" stop-color="#6c3483"/></linearGradient>
  </defs>
  <rect width="1200" height="180" fill="#f4f6f9" rx="8"/>
  <text x="600" y="40" font-family="'Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#1a5276" text-anchor="middle">附6.2 走访记录业务流程</text>
  <rect x="7.0" y="65.0" width="180" height="70" rx="8" fill="url(#gdb)" filter="url(#sh)"/>
<text x="97" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">创建走访任务</text>
<line x1="187" y1="100" x2="174" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="174.0" y="65.0" width="180" height="70" rx="8" fill="url(#gmb)" filter="url(#sh)"/>
<text x="264" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">分配网格员</text>
<line x1="354" y1="100" x2="341" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="341.0" y="65.0" width="180" height="70" rx="8" fill="url(#gte)" filter="url(#sh)"/>
<text x="431" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">现场走访执行</text>
<line x1="521" y1="100" x2="508" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="508.0" y="65.0" width="180" height="70" rx="8" fill="url(#ggr)" filter="url(#sh)"/>
<text x="598" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">填写记录拍照</text>
<line x1="688" y1="100" x2="675" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="675.0" y="65.0" width="180" height="70" rx="8" fill="url(#gor)" filter="url(#sh)"/>
<text x="765" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">提交审核</text>
<line x1="855" y1="100" x2="842" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="842.0" y="65.0" width="180" height="70" rx="8" fill="url(#gpr)" filter="url(#sh)"/>
<text x="932" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">是否需要上报</text>
<line x1="1022" y1="100" x2="1009" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="1009.0" y="65.0" width="180" height="70" rx="8" fill="url(#gdk)" filter="url(#sh)"/>
<text x="1099" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">直接归档</text>
<circle cx="创建走访任务" cy="100" r="0" opacity="0"/>
  <text x="600" y="180-20" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">数字荣成治理提升项目</text>
</svg>