<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1a5276"/></marker>
    <filter id="sh"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.12"/></filter>
    <linearGradient id="gdb" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a5276"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
    <linearGradient id="gmb" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2471a3"/><stop offset="100%" stop-color="#2e86c1"/></linearGradient>
    <linearGradient id="gte" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1abc9c"/><stop offset="100%" stop-color="#16a085"/></linearGradient>
    <linearGradient id="gdk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/></linearGradient>
    <linearGradient id="gor" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f39c12"/><stop offset="100%" stop-color="#e67e22"/></linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <linearGradient id="ggr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#27ae60"/><stop offset="100%" stop-color="#229954"/></linearGradient>
    <linearGradient id="gpr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8e44ad"/><stop offset="100%" stop-color="#6c3483"/></linearGradient>
  </defs>
  <rect width="1200" height="180" fill="#f4f6f9" rx="8"/>
  <text x="600" y="40" font-family="'Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#1a5276" text-anchor="middle">图4.3-1 应急指挥全流程</text>
  <rect x="63.0" y="65.0" width="180" height="70" rx="8" fill="url(#grd)" filter="url(#sh)"/>
<text x="153" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">1.事件接收
与定位</text>
<line x1="243" y1="100" x2="286" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="286.0" y="65.0" width="180" height="70" rx="8" fill="url(#gor)" filter="url(#sh)"/>
<text x="376" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">2.资源分级
展示</text>
<line x1="466" y1="100" x2="509" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="509.0" y="65.0" width="180" height="70" rx="8" fill="url(#gmb)" filter="url(#sh)"/>
<text x="599" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">3.处置方案
生成</text>
<line x1="689" y1="100" x2="732" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="732.0" y="65.0" width="180" height="70" rx="8" fill="url(#gdb)" filter="url(#sh)"/>
<text x="822" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">4.指挥调度
执行</text>
<line x1="912" y1="100" x2="955" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
<rect x="955.0" y="65.0" width="180" height="70" rx="8" fill="url(#ggr)" filter="url(#sh)"/>
<text x="1045" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">5.处置归档
与复盘</text>
<circle cx="1.事件接收
与定位" cy="100" r="0" opacity="0"/>
  <text x="600" y="180-20" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">数字荣成治理提升项目</text>
</svg>