<text x="466" y="116" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#bdc3c7" text-anchor="middle">0~-30 / W=25%</text>
<line x1="556" y1="100" x2="644" y2="100" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
