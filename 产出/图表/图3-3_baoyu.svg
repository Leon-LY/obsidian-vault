<text x="312" y="92" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">2.任务分配</text>
<text x="312" y="116" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#bdc3c7" text-anchor="middle">网格到人</text>
